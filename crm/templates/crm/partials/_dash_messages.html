{% for msg in recent_messages %}
<div class="p-5 rounded-xl bg-primary border border-white/5 hover:border-accent/30 transition-colors mb-4">
    <div class="flex justify-between items-start mb-2">
        <div class="font-bold text-white">{{ msg.full_name }}</div>
        <div class="text-xs text-accent font-medium bg-accent/10 px-2 py-1 rounded">{{ msg.created_at|date:"d M Y" }}</div>
    </div>
    <div class="text-sm text-gray-400 mb-3 font-medium">{{ msg.subject }}</div>
    
    <div class="flex items-center justify-between gap-3 pt-3 border-t border-white/5">
        <div class="text-xs text-gray-500 truncate w-1/2" title="{{ msg.email }}">
            {% if msg.phone %}{{ msg.phone }}<br>{% endif %}
            {{ msg.email }}
        </div>
        {% if msg.phone %}
        <a href="https://wa.me/{{ msg.phone|cut:' '|cut:'+'|cut:'('|cut:')'|cut:'-' }}" target="_blank"
            class="shrink-0 flex items-center justify-center gap-2 px-3 py-2 bg-[#25D366]/10 hover:bg-[#25D366]/20 text-[#25D366] rounded-lg font-bold transition-all text-xs border border-[#25D366]/20">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.564-10.563 5.826 0 10.564 4.738 10.564 10.563 0 5.827-4.739 10.563-10.564 10.563z"/>
            </svg>
            Yaz
        </a>
        {% endif %}
    </div>
</div>
{% empty %}
<div class="text-center py-6 text-gray-500 text-sm">Cevaplanmamış mesaj yok.</div>
{% endfor %}

{% if messages_page.has_next %}
<div id="messages-load-more" class="text-center mt-4 mb-2">
    <button data-url="{% url 'crm_dashboard' %}?load_messages=1&page={{ messages_page.next_page_number }}"
        class="dash-msg-load-more px-6 py-2 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl transition-all font-bold flex items-center justify-center gap-2 mx-auto text-xs">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
        Daha Fazla Mesaj
    </button>
</div>
{% endif %}
