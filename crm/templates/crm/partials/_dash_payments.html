{% for pmt in recent_payments %}
<div class="flex items-center justify-between p-5 rounded-xl bg-primary border border-white/5 mb-4">
    <div>
        <div class="font-bold text-white mb-1">{{ pmt.student.full_name }}</div>
        <div class="text-xs text-gray-400">{{ pmt.payment_date|date:"d M Y" }} &bull; {{ pmt.get_payment_method_display }}</div>
    </div>
    <div class="text-xl font-heading font-black text-green-400">₺{{ pmt.amount }}</div>
</div>
{% empty %}
<div class="text-center py-6 text-gray-500 text-sm">Henüz bir ödeme kaydı yok.</div>
{% endfor %}

{% if payments_page.has_next %}
<div id="payments-load-more" class="text-center mt-4 mb-2">
    <button data-url="{% url 'crm_dashboard' %}?load_payments=1&page={{ payments_page.next_page_number }}"
        class="dash-pmt-load-more px-6 py-2 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-xl transition-all font-bold flex items-center justify-center gap-2 mx-auto text-xs">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
        Daha Fazla Ödeme
    </button>
</div>
{% endif %}
