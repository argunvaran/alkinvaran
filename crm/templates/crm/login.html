{% extends 'crm/base.html' %}

{% block login_content %}
<div
    class="relative z-10 w-full max-w-md bg-secondary/80 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-heading font-black tracking-tight mb-2 uppercase"><span class="text-accent">AV</span>
            SYSTEM</h1>
        <p class="text-gray-400 font-medium tracking-wide">Yönetim Paneline Giriş Yapın</p>
    </div>

    {% if messages %}
    <div class="mb-6 space-y-2">
        {% for message in messages %}
        <div
            class="p-4 rounded-xl {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-bold text-gray-400 mb-2 uppercase tracking-widest">Kullanıcı Adı</label>
            <input type="text" name="username" required
                class="w-full bg-primary border border-white/10 rounded-xl px-4 py-4 text-white placeholder-gray-600 focus:outline-none focus:border-accent transition-colors">
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-400 mb-2 uppercase tracking-widest">Şifre</label>
            <input type="password" name="password" required
                class="w-full bg-primary border border-white/10 rounded-xl px-4 py-4 text-white placeholder-gray-600 focus:outline-none focus:border-accent transition-colors">
        </div>

        <button type="submit"
            class="w-full bg-accent hover:bg-accent-dark text-white font-black py-4 rounded-xl mt-4 transition-all uppercase tracking-widest hover:scale-[1.02] shadow-lg shadow-accent/20">
            Giriş Yap
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-gray-600 font-medium">
        &copy; 2026 Alkin Varan. Tüm hakları gizlidir.
    </div>
</div>
{% endblock %}
